name: ci

on:
  push:
    branches:
      - main
      - codex/direct-onboarding
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.5
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2 # exact version, not floating major

      - name: Setup Node
        uses: actions/setup-node@v4.4.0 # exact version, not floating major
        with:
          node-version: 24.11.1

      - name: Resolve pnpm store
        id: pnpm-store
        run: echo "path=$(npx -y pnpm@10.33.0 store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4.2.3 # exact version, not floating major
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install
        run: npx -y pnpm@10.33.0 install --frozen-lockfile

      - name: Verify
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: |
          set -o pipefail
          mkdir -p .omo/evidence
          npx -y pnpm@10.33.0 verify 2>&1 | tee .omo/evidence/ci-verify.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4.6.2 # exact version, not floating major
        with:
          name: calledit-ci-failure
          path: |
            .omo/evidence/**
            .turbo/runs/**
